<body class="page2">

    <header>
        <nav class="nav-bar">
            <div class="logo"><img src="image/logo.png" alt="logo"></div>
            <ul class="nav-list">
                <li><a href="index.html">Home</a></li>

            </ul>
        <button class="nav-button">ORDER NOW</button>
        </nav>
    </header>

    <main>
        <section>
            <h1 class="contact">Contact Us</h1>
            <p class="contact">We would love to hear from you. Please fill out the form below.</p>
            
            <form id="contactForm">
                
                    <label style="display: block;"for="name">Name:</label><br>
                    <input type="text" id="name" name="name" required><br><br>

                    <label for="email">Email:</label><br>
                    <input type="email" id="email" name="email" required><br><br>

                    <label for="subject">Subject:</label><br>
                    <input type="text" id="subject" name="subject" required><br><br>

                    <label for="message">Message:</label><br>
                    <textarea id="message" name="message" rows="5" required></textarea><br><br>

                    <button type="submit">Send Message</button>

            </form>
        </section>

        <section class="Location">
            <h2>Our Location</h2>
            <iframe src="https://www.google.com/maps/embed?pb=..." allowfullscreen="" loading="lazy"></iframe>
        </section>
    </main>

    <footer class="footer1">
        <p id="sign">Email: info@bakery.com | Phone: +123 456 789</p>
        <p id="sign">© 2026 Bakery Co. All Rights Reserved.</p>
    </footer>
